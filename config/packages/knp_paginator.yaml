# config/packages/knp_paginator.yaml

knp_paginator:
    page_range: 5
    default_options:
        # Paginator Argument Names (These must be STRINGS, NOT null or ~)

        # 1. Pagination
        page_name: page
        default_limit: 10
        page_out_of_range: ignore

        # 2. Sorting
        sort_field_name: sort_by # Required string name
        sort_direction_name: direction # Required string name

        # 3. Filtration (The likely source of your current error)
        filter_field_name: filterField # Required string name
        filter_value_name: filterValue # Required string name

        # Other Defaults
        distinct: true

    template:
        pagination: '/components/shared/_pagination.html.twig'
        filtration: "@KnpPaginator/Pagination/filtration.html.twig"
