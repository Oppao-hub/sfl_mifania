security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider

    role_hierarchy:
        ROLE_STAFF: [ROLE_CUSTOMER]
        ROLE_ADMIN: [ROLE_STAFF, ROLE_ALLOWED_TO_SWITCH]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: App\Security\JwtAuthenticationSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator:
                - App\Security\LoginAuthenticator
                - App\Security\GoogleAuthenticator
            user_checker: App\Security\UserChecker
            logout:
                path: app_logout
                # where to redirect after logout
                # target: app_any_route

            remember_me:
                secret: "%kernel.secret%"
                lifetime: 604800
                path: /

            switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
       # 1. API Rules
        - { path: ^/api/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/login/google, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/sub_categories, roles: PUBLIC_ACCESS }
        - { path: ^/api/products, roles: PUBLIC_ACCESS }
        - { path: ^/api/stories, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        # 2. Admin & Staff Rules
        - { path: ^/admin/account, roles: ROLE_ADMIN }
        - { path: ^/staff/account, roles: ROLE_STAFF }
        - { path: ^/dashboard, roles: [ROLE_ADMIN, ROLE_STAFF] }

        # 3.Authenticated Rules
        - { path: ^/google/connect, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/chat, roles: ROLE_CUSTOMER }
        - { path: ^/cart, roles: PUBLIC_ACCESS }
        - { path: ^/wishlist, roles: PUBLIC_ACCESS }
        - { path: ^/checkout, roles: ROLE_CUSTOMER }
        - { path: ^/orders, roles: ROLE_CUSTOMER }
        - { path: ^/account, roles: ROLE_CUSTOMER }

        # 4. Public Pages
        - { path: ^/email-verification, roles: PUBLIC_ACCESS }
        - { path: ^/home, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
