when@dev:
    web_profiler:
        toolbar: false
        intercept_redirects: false
        excluded_ajax_paths: '^/((index|app(_[\\w]+)?)\\.php/)?admin\/customer\/?'

    framework:
        profiler:
            collect_serializer_data: true

when@test:
    framework:
        profiler:
            collect: false
            collect_serializer_data: true
