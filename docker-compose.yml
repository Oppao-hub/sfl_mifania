services:
    mysql:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        ports:
            - "${MYSQL_PORT}:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - mifania_network

    phpmyadmin:
        image: phpmyadmin:latest
        restart: unless-stopped
        environment:
            PMA_HOST: mysql
            PMA_USER: ${MYSQL_USER}
            PMA_PASSWORD: ${MYSQL_PASSWORD}
        ports:
            - "8080:80"
        depends_on:
            - mysql
        networks:
            - mifania_network

    ###> symfony/mercure-bundle ###
    mercure:
        image: dunglas/mercure
        restart: unless-stopped
        ports:
            - "3000:80" # Maps port 3000 on your Mac to port 80 inside the container!
        environment:
            SERVER_NAME: ":80" # disable HTTPS for dev inside the container
            MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
            MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
            MERCURE_EXTRA_DIRECTIVES: |
                cors_origins http://127.0.0.1:8000 http://localhost:8000 https://127.0.0.1:8000 https://localhost:8000
        command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/.well-known/mercure"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        volumes:
            - mercure_data:/data
            - mercure_config:/config
        networks:
            - mifania_network

volumes:
    ###> symfony/mercure-bundle ###
    mercure_data:
    mercure_config:
    ###< symfony/mercure-bundle ###
    mysql_data:

networks:
    mifania_network:
        driver: bridge
